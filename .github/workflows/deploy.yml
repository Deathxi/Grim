name: Deploy Grim

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/grim
            git pull origin main
            systemctl reset-failed grim
            systemctl restart grim
            sleep 5
            systemctl is-active grim && echo "Grim redeployed successfully" || echo "WARNING: Grim failed to start"
